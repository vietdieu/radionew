<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommuteCast - Bản tin</title>
    <!-- Nếu không dùng Service Worker, comment hoặc xóa dòng sau -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <link rel="icon" type="image/jpeg" href="/icon-192.jpg" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />
    <meta name="theme-color" content="#0f172a" />
  </head>
  <body>
    <!-- Global Error Overlay -->
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); color: #f1f5f9; padding: 24px; font-family: 'Segoe UI', system-ui, sans-serif; z-index: 99999; overflow: auto; backdrop-filter: blur(8px);">
      <div style="max-width: 720px; margin: 0 auto; padding-top: 40px;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
          <span style="font-size: 40px;">⚠️</span>
          <h2 style="color: #ef4444; margin: 0; font-size: 24px;">Ứng dụng gặp sự cố khởi động</h2>
        </div>
        <p style="color: #94a3b8; margin-bottom: 16px;">Hệ thống phát hiện lỗi JavaScript bên dưới:</p>
        <div style="background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; overflow-x: auto;">
          <pre id="error-message" style="margin: 0; white-space: pre-wrap; word-break: break-word; color: #f87171; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6;"></pre>
        </div>
        <div style="margin-top: 24px; display: flex; flex-wrap: wrap; gap: 12px;">
          <button onclick="window.location.reload(true)" style="background: #06b6d4; color: #0f172a; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">🔄 Tải lại trang</button>
          <button onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload(true);" style="background: #e11d48; color: #ffffff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">🗑️ Xóa Cache & Reset</button>
        </div>
      </div>
    </div>

    <script>
      // Bắt lỗi đồng bộ (throw)
      window.addEventListener('error', function(e) {
        if (e.message && (
          e.message.indexOf('WebSocket') !== -1 ||
          e.message.indexOf('vite') !== -1 ||
          e.message.indexOf('hmr') !== -1
        )) {
          console.warn('CommuteCast: Filtered out harmless error:', e.message);
          return;
        }
        var overlay = document.getElementById('error-overlay');
        var msg = document.getElementById('error-message');
        if (overlay && msg) {
          overlay.style.display = 'block';
          msg.textContent = e.message + '\nTại: ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\nStack:\n' + (e.error ? e.error.stack : 'Không có stack trace');
        }
      });

      // Bắt lỗi bất đồng bộ (Promise rejection)
      window.addEventListener('unhandledrejection', function(e) {
        var reasonStr = String(e.reason || '');
        var stackStr = (e.reason && e.reason.stack) ? String(e.reason.stack) : '';
        
        if (
          reasonStr.indexOf('WebSocket') !== -1 ||
          reasonStr.indexOf('vite') !== -1 ||
          reasonStr.indexOf('hmr') !== -1 ||
          stackStr.indexOf('WebSocket') !== -1 ||
          stackStr.indexOf('vite') !== -1 ||
          stackStr.indexOf('client:454') !== -1
        ) {
          console.warn('CommuteCast: Filtered out harmless unhandled rejection:', e.reason);
          return;
        }

        var overlay = document.getElementById('error-overlay');
        var msg = document.getElementById('error-message');
        if (overlay && msg) {
          overlay.style.display = 'block';
          msg.textContent = 'Unhandled Promise Rejection: ' + e.reason + '\n\nStack:\n' + (e.reason && e.reason.stack ? e.reason.stack : 'Không có stack trace');
        }
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
